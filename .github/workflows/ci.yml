name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, format, syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: Syntax check (eslint.config.js)
        run: node --check eslint.config.js

      - name: Syntax check (service-worker.js)
        run: node --check service-worker.js

      - name: Syntax check (js/biomeca.js)
        run: node --check js/biomeca.js

      - name: Syntax check (js/landing.js)
        run: node --check js/landing.js
