name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, format, syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Histoire complète pour la garde CACHE_VERSION (git diff BASE...HEAD
          # nécessite le merge-base commun, indisponible en shallow clone).
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Block legacy service_role and JWT keys in client code
        run: |
          PATTERNS="service_role|sb_secret_|eyJ[A-Za-z0-9_-]{20,}"
          if grep -rEn "$PATTERNS" js/ index.html service-worker.js 2>&1 | grep -v "^Binary file"; then
            echo "❌ Sensitive credential pattern detected in client code — blocking build"
            exit 1
          fi
          echo "✓ No sensitive credentials detected in client code"

      # #77 — force le bump CACHE_VERSION dès qu'une PR change du code applicatif.
      # Sans ça, le service worker garde l'ancien CACHE_VERSION → activate ne
      # purge pas → les clients continuent à servir index.html/js/**/css/** depuis
      # le cache pourri. Guard PR-only : les pushes de branche seuls n'ont pas
      # de base fiable et déclencheraient le check hors contexte.
      - name: Require CACHE_VERSION bump when app code changes
        if: github.event_name == 'pull_request'
        run: |
          BASE="origin/${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          APP_CHANGED=$(echo "$CHANGED" | grep -E '^(index\.html|js/|css/)' || true)
          if [ -z "$APP_CHANGED" ]; then
            echo "✓ No app code changed (index.html, js/**, css/**) — CACHE_VERSION bump not required"
            exit 0
          fi
          echo "App code changed :"
          echo "$APP_CHANGED"
          if ! git diff "$BASE"...HEAD -- service-worker.js | grep -E '^\+const CACHE_VERSION\s*=' > /dev/null; then
            echo "❌ Bump CACHE_VERSION dans service-worker.js : sinon les utilisateurs continueront à exécuter l'ancien code depuis le cache du service worker"
            exit 1
          fi
          echo "✓ CACHE_VERSION bump detected in service-worker.js"

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: TypeScript check (calc.mjs)
        run: npm run typecheck

      - name: Syntax check (eslint.config.js)
        run: node --check eslint.config.js

      - name: Syntax check (service-worker.js)
        run: node --check service-worker.js

      - name: Syntax check (js/biomeca.js)
        run: node --check js/biomeca.js

      - name: Syntax check (js/landing.js)
        run: node --check js/landing.js
