name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, format, syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Block legacy service_role and JWT keys in client code
        run: |
          PATTERNS="service_role|sb_secret_|eyJ[A-Za-z0-9_-]{20,}"
          if grep -rEn "$PATTERNS" js/ index.html service-worker.js 2>&1 | grep -v "^Binary file"; then
            echo "❌ Sensitive credential pattern detected in client code — blocking build"
            exit 1
          fi
          echo "✓ No sensitive credentials detected in client code"

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: TypeScript check (calc.mjs)
        run: npm run typecheck

      - name: Syntax check (eslint.config.js)
        run: node --check eslint.config.js

      - name: Syntax check (service-worker.js)
        run: node --check service-worker.js

      - name: Syntax check (js/biomeca.js)
        run: node --check js/biomeca.js

      - name: Syntax check (js/landing.js)
        run: node --check js/landing.js
